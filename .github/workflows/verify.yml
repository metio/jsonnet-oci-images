# PR gate so Containerfile-only and workflow-only changes (notably Renovate's
# base-image and GitHub-Actions bumps) have a green check to auto-merge against.
# The build pipeline (libraries.yml) only runs on cron/dispatch, so without this
# a PR carried no status at all. Kept deliberately small: lint the one generic
# Containerfile (hadolint) and the workflows (actionlint, which also shellchecks
# the run: blocks). Both tools come from the flake devShell, pinned by
# flake.lock, so a local run and CI agree. A single all-green aggregate is the
# only check to mark required in branch protection.
name: Verify
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  hadolint:
    name: Containerfile lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # hadolint discovers the repo's .hadolint.yaml from the working dir.
      - run: nix develop --command hadolint Containerfile
  actionlint:
    name: Actions lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # shellcheck rides in the devShell, so actionlint lints run: blocks too.
      - run: nix develop --command actionlint
  all-green:
    name: All checks passed
    needs: [hadolint, actionlint]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify every dependency succeeded
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$RESULTS" | jq -e 'all(.[].result; . == "success" or . == "skipped")' \
            || { echo "::error::a verify job did not pass"; exit 1; }
