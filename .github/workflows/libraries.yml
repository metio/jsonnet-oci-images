# Builds every Jsonnet-OCI-Image from the generic Containerfile, driven entirely
# by libraries.json. No per-library file, no hardcoded version, no Renovate:
# discover.sh records each upstream library's current HEAD SHA, so a new commit
# upstream changes the manifest and ONLY the changed images rebuild;
# build-args.sh enumerates versions at that SHA. Zero manual upkeep.
name: Build Libraries
on:
  schedule:
    - cron: "27 5 * * *" # daily: catch upstream commits + new libraries
  workflow_dispatch:
    inputs:
      all:
        description: Rebuild every library, not just the changed ones
        type: boolean
        default: false
# Serialize runs: a workflow_dispatch firing during the daily cron (or two
# dispatches) would otherwise race two discover jobs committing the refreshed
# manifest to the same branch, and the loser's git push fails non-fast-forward.
# Queue rather than cancel — a run cancelled mid-push could leave a partial state.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
# Least privilege: default to read; each job widens only to what it needs.
permissions:
  contents: read
jobs:
  discover:
    name: Discover libraries
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the refreshed manifest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
      date: ${{ steps.set.outputs.date }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: refresh
        name: Refresh manifest + compute changed libraries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_ALL: ${{ github.event.inputs.all }}
        run: |
          [ -f libraries.json ] || echo '[]' > libraries.json
          # discover.sh reads the committed manifest and is additive-only — the
          # output is always a superset, so a transient discovery failure can
          # never drop a published library here.
          hack/discover.sh > new.json
          # entries whose SHA changed or that are new (or everything, on force/first run)
          if [ "$FORCE_ALL" = "true" ]; then
            cp new.json changed.json
          else
            jq -c --slurpfile old libraries.json \
              '(reduce ($old[0][]?) as $e ({}; .[$e.name]=$e.sha)) as $o
               | [ .[] | select(.sha != ($o[.name] // "")) ]' new.json > changed.json
          fi
          # Diagnostics: what the manifest holds now vs what changed/is new.
          echo "manifest holds $(jq length new.json) libraries; $(jq length changed.json) changed or new this run"
          echo "changed/new libraries:"; jq -r '.[].name' changed.json | sed 's/^/  - /'
      - id: set
        name: Emit build matrix (changed libraries only)
        run: |
          n=$(jq length changed.json)
          any=$([ "$n" -gt 0 ] && echo true || echo false)
          # Shared calver tag for everything (re)built in this run — the metio
          # calendar convention. Pushed alongside :latest so users can pin an
          # image to an immutable dated snapshot instead of the moving :latest.
          {
            echo "any=$any"
            echo "matrix=$(jq -c '{lib: .}' changed.json)"
            echo "date=$(date +'%Y.%-m.%-d')"
          } >> "$GITHUB_OUTPUT"
      - name: Commit refreshed manifest
        # Deliberately the LAST step, after the build matrix is emitted: a push
        # failure (a branch-protection change, a rare non-fast-forward despite
        # the concurrency guard) fails this job loudly, but `build` gates on
        # `!cancelled()` rather than discover's success, so the image builds
        # still run from the already-computed changed set. A manifest that can't
        # land never silently drops every rebuild.
        run: |
          if diff -q libraries.json new.json >/dev/null 2>&1; then
            echo "manifest unchanged — no commit"
            exit 0
          fi
          mv new.json libraries.json
          hack/gen-readme.sh libraries.json > LIBRARIES.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add libraries.json LIBRARIES.md
          git commit -m 'chore: refresh JOI library manifest'
          git push
          echo "manifest refreshed and committed"
  build:
    name: ${{ matrix.lib.name }}
    needs: discover
    # !cancelled() (not success) so a failed manifest commit in discover doesn't
    # skip the builds — the matrix output is already set by the time that step
    # runs. any=='true' still gates out empty runs.
    if: ${{ !cancelled() && needs.discover.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    # This job processes untrusted upstream library metadata, so it gets no
    # contents: write — only what it needs to push images and sign.
    permissions:
      contents: read
      packages: write # push images to ghcr.io
      id-token: write # cosign keyless signing
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: args
        name: Compute build args (enumerate versions at the pinned SHA)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Via env, never interpolated into the shell: a library entry's fields
          # (name, repo, free-text description) come from untrusted upstream
          # GitHub data, so inlining ${{ toJSON(matrix.lib) }} into a quoted
          # string would let a crafted description close the quote and inject
          # commands into this push/sign-capable job.
          LIB_JSON: ${{ toJSON(matrix.lib) }}
        run: printf '%s' "$LIB_JSON" | hack/build-args.sh >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - id: verify
        name: Build locally and assert a single layer
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Containerfile
          load: true
          push: false
          provenance: false
          sbom: false
          tags: joi-verify:latest
          build-args: |
            JB_PKGS=${{ env.JB_PKGS }}
            COPY_PATH=${{ env.COPY_PATH }}
            LATEST_DIR=${{ env.LATEST_DIR }}
            LATEST_TARGET=${{ env.LATEST_TARGET }}
            JB_REF=${{ env.JB_REF }}
      - name: Assert exactly one layer
        env:
          LIB_NAME: ${{ matrix.lib.name }}
        run: |
          n=$(docker image inspect joi-verify:latest --format '{{ len .RootFS.Layers }}')
          [ "$n" = "1" ] || { echo "::error::$LIB_NAME has $n layers, expected 1"; exit 1; }
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        name: Build and push (:latest + dated calver tag)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Containerfile
          push: true
          # Keep attestations off on the push too (the verify step already does):
          # a provenance/SBOM attestation adds an extra manifest entry to the
          # pushed index, which would defeat the single-layer guarantee the verify
          # step asserts — the verified image must match the pushed one.
          provenance: false
          sbom: false
          # The content is arch-independent Jsonnet text; a multi-arch index lets
          # any node arch pull the image as an image volume or OCIRepository
          # source. This is the same arch set every metio image ships, so the
          # jaas operator and the JOI libraries it consumes are co-schedulable
          # everywhere. The builder stage is pinned to $BUILDPLATFORM, so this
          # needs no QEMU and each per-arch manifest shares the same single
          # data layer.
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
          # :latest is the moving tag (auto-updates on every upstream change);
          # the dated tag is an immutable snapshot users can pin to. A library is
          # only (re)built when its upstream SHA changes, so each dated tag marks
          # a distinct content version — between changes the content is identical.
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ needs.discover.outputs.date }}
          build-args: |
            JB_PKGS=${{ env.JB_PKGS }}
            COPY_PATH=${{ env.COPY_PATH }}
            LATEST_DIR=${{ env.LATEST_DIR }}
            LATEST_TARGET=${{ env.LATEST_TARGET }}
            JB_REF=${{ env.JB_REF }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ matrix.lib.sha }}
      - name: Sign
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}"
